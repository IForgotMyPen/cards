<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards</title>
    <link rel="stylesheet" href="styles.css">   
</head>
<body>
    <div class="board-menu">
        <button type="button" class="board-links" onclick="changeBoard(event, 'zen-board')">Zen</button>
        <button type="button" class="board-links" onclick="changeBoard(event, 'typing-board')">Typing Game</button>
    </div>

    <p></p>

    <div class="board-content" id="zen-board">
        <div class="deck-selection-menu">
        </div>

        <div class="action-menu">
            <button type="button" class="action-links" onclick="currentBoard.currentDeck.draw()">Draw</button>
            <button type="button" class="action-links" onclick="currentBoard.currentDeck.resetDeck()">Reset deck</button>
            <button type="button" class="action-links" onclick="clearBoard()">Clear board</button>
        </div>

        <p id="error-message"></p>

        <div class="card-display-area">
        </div>
    </div>

    <div class="board-content" id="typing-board">
        <div class="deck-selection-menu">
        </div>

        <div class="action-menu">
            <button type="button" class="action-links" onclick="startTypingGame()">Start</button>
            <button type="button" class="action-links" onclick="stopTypingGame()">Stop</button>
        </div>

        <form class="user-input-area">
            <input type="text" id="user-typing-input" placeholder="Type card name here...">
        </form>

        <p id="error-message"></p>

        <p id="time-remaining"></p>

        <div class="card-display-area">
        </div>
    </div>

    <script src="cards.js"></script>

</body>
</html>
